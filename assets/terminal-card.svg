<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Animated terminal card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#070816"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee7ff" stop-opacity="0.75"/>
      <stop offset="0.45" stop-color="#8b0000" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd700" stop-opacity="0.45"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>

    <clipPath id="cardClip">
      <rect x="70" y="40" width="1060" height="240" rx="18" ry="18"/>
    </clipPath>

    <!-- typing reveal masks -->
    <clipPath id="reveal1"><rect x="120" y="112" width="0" height="22">
      <animate attributeName="width" from="0" to="980" dur="1.0s" begin="0.2s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="reveal2"><rect x="120" y="146" width="0" height="22">
      <animate attributeName="width" from="0" to="980" dur="1.1s" begin="1.15s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="reveal3"><rect x="120" y="180" width="0" height="22">
      <animate attributeName="width" from="0" to="980" dur="1.05s" begin="2.35s" fill="freeze"/>
    </rect></clipPath>
    <clipPath id="reveal4"><rect x="120" y="214" width="0" height="22">
      <animate attributeName="width" from="0" to="980" dur="1.15s" begin="3.45s" fill="freeze"/>
    </rect></clipPath>

    <!-- scanlines -->
    <pattern id="scan" width="2" height="6" patternUnits="userSpaceOnUse">
      <rect width="2" height="2" fill="#ffffff" opacity="0.035"/>
      <rect y="2" width="2" height="4" fill="#000000" opacity="0"/>
    </pattern>
  </defs>

  <!-- card -->
  <rect width="1200" height="320" fill="transparent"/>
  <g filter="url(#shadow)">
    <rect x="70" y="40" width="1060" height="240" rx="18" ry="18" fill="url(#bg)" stroke="#1b2440" stroke-width="2"/>
    <rect x="70" y="40" width="1060" height="34" rx="18" ry="18" fill="#0e1630"/>
    <rect x="70" y="57" width="1060" height="17" fill="#0e1630"/>
    <rect x="70" y="74" width="1060" height="2" fill="url(#accent)" opacity="0.75"/>

    <!-- window dots -->
    <circle cx="98" cy="57" r="6" fill="#ff5f56"/>
    <circle cx="118" cy="57" r="6" fill="#ffbd2e"/>
    <circle cx="138" cy="57" r="6" fill="#27c93f"/>

    <text x="170" y="62" fill="#cdd0df" font-family="ui-sans-serif, -apple-system, Segoe UI, Inter, Arial" font-size="12" font-weight="700" opacity="0.95">
      terminal  chris@workstation
    </text>

    <!-- content -->
    <g clip-path="url(#cardClip)">
      <rect x="70" y="40" width="1060" height="240" fill="url(#scan)" opacity="0.65"/>

      <!-- subtle ambient particles layer (second animation) -->
      <g opacity="0.45">
        <rect x="930" y="92" width="3" height="3" fill="#ffd700" opacity="0.16">
          <animate attributeName="opacity" values="0.05;0.22;0.05" dur="2.6s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-28 10" dur="2.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="1000" y="160" width="2" height="2" fill="#7ee7ff" opacity="0.14">
          <animate attributeName="opacity" values="0.04;0.20;0.04" dur="3.1s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-20 -12" dur="3.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="890" y="210" width="2" height="2" fill="#ffd700" opacity="0.12">
          <animate attributeName="opacity" values="0.03;0.18;0.03" dur="2.9s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate" from="0 0" to="-24 -8" dur="2.9s" repeatCount="indefinite"/>
        </rect>
      </g>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="16" fill="#e9ecff">
        <text x="120" y="125" opacity="0.95">$ whoami</text>
        <g clip-path="url(#reveal1)"><text x="120" y="125" fill="#e9ecff">$ whoami</text></g>

        <text x="120" y="159" fill="#a9abc0">Chris</text>
        <g clip-path="url(#reveal2)"><text x="120" y="159" fill="#a9abc0">Chris</text></g>

        <text x="120" y="193" opacity="0.95">$ focus --now</text>
        <g clip-path="url(#reveal3)"><text x="120" y="193" fill="#e9ecff">$ focus --now</text></g>

        <text x="120" y="227" fill="#7ee7ff">ITIL " docs " automation " reliable systems</text>
        <g clip-path="url(#reveal4)"><text x="120" y="227" fill="#7ee7ff">ITIL " docs " automation " reliable systems</text></g>

        <!-- blinking cursor -->
        <rect x="540" y="215" width="10" height="18" fill="#ffd700" opacity="0.85">
          <animate attributeName="opacity" values="0.0;0.85;0.0" dur="0.95s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>
</svg>
